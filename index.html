<!doctype html>
<html lang="fr-TN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Canonical URL is set per-route via react-helmet-async (see src/components/seo/SEO.tsx) -->


    <!-- Browser theme color -->
    <meta name="theme-color" content="#000000" />

    <!-- Preconnect for faster Google Fonts loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- PWA support (installable web app) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RepairPro">
    <meta name="application-name" content="RepairPro">

    <!-- SEO (sitewide defaults; per-route overrides via react-helmet-async) -->
    <title>RepairPro — Gestion d'atelier de réparation mobile</title>

    <meta name="description" content="Logiciel SaaS pour gérer un atelier de réparation mobile : inventaire, réparations, facturation et clients." />
    <meta name="author" content="RepairPro" />
    <meta name="keywords" content="SaaS réparation mobile, gestion de stock téléphone, facturation, logiciel réparation, Tunisie, France, suivi réparations, inventaire téléphone, gestion atelier, RepairPro" />
    <meta name="robots" content="index, follow" />

    <!-- OpenGraph (Facebook / WhatsApp / LinkedIn preview) -->
    <meta property="og:title" content="RepairPro TN — Gestion d'atelier de réparation mobile" />
    <meta property="og:description" content="Logiciel complet pour gérer votre atelier : réparations, clients, stock et facturation." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.getheavencoin.com/" />
    <meta property="og:image" content="https://www.getheavencoin.com/og-image.jpg" />
    <meta property="og:locale" content="fr_TN" />
    <meta property="og:site_name" content="RepairPro TN" />

    <!-- Twitter preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RepairPro TN — Gestion d'atelier de réparation mobile" />
    <meta name="twitter:description" content="Logiciel de gestion d'atelier de réparation mobile en Tunisie." />
    <meta name="twitter:image" content="https://www.getheavencoin.com/og-image.jpg" />

    <!-- Structured Data (SEO schema) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RepairPro TN",
      "description": "Logiciel de gestion d'atelier de réparation mobile en Tunisie",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://www.getheavencoin.com/",
      "publisher": {
        "@type": "Organization",
        "name": "RepairPro TN"
      }
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
